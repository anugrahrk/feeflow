name: Deploy Server to AWS EC2

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'    # Only runs when files inside server/ change

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server          # Dockerfile is inside server/
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/feeflow:latest
            ${{ secrets.DOCKER_USERNAME }}/feeflow:${{ github.sha }}

      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull the latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/feeflow:latest

            # Stop and remove old container if running
            docker stop feepay-server || true
            docker rm feepay-server || true

            # Run new container with all env vars from the .env file on the server
            docker run -d \
              --name feepay-server \
              --restart always \
              -p 3000:3000 \
              --env-file /home/ec2-user/feepay.env \
              ${{ secrets.DOCKER_USERNAME }}/feeflow:latest