name: Deploy Server to Cloudflare Workers

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'      # Only trigger when server code changes
                         # Push to client/ or landing/ won't trigger this

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    defaults:
      run:
        working-directory: server   # All steps run inside /server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json  # Monorepo-aware cache

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: server   # Tell wrangler-action where wrangler.jsonc lives